<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Cloud Roadmap — por conocimiento</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3250;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#4a5568;
  --green:#52b788;--green-bg:#1b3a2d;--green-text:#b7e4c7;
  --blue:#74c0fc;--blue-bg:#1c2e4a;--blue-text:#a5d8ff;
  --amber:#ffc078;--amber-bg:#3d2600;--amber-text:#ffd8a8;
  --red:#ff6b6b;--red-bg:#3b0d0d;--red-text:#ffc9c9;
  --purple:#c3b1e1;--purple-bg:#2d1f4a;--purple-text:#d8bfd8;
  --teal:#2dd4bf;--teal-bg:#0d2f2a;--teal-text:#99f6e4;
  --coral:#f4a261;--coral-bg:#3a1a0a;--coral-text:#ffd8b8;
  --radius:10px;--radius-sm:6px;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#f0f4f8;--surface:#ffffff;--surface2:#e8edf5;--border:#d1d9e6;
    --text:#1a202c;--text2:#4a5568;--text3:#a0aec0;
    --green:#2d6a4f;--green-bg:#d8f3dc;--green-text:#1b4332;
    --blue:#1971c2;--blue-bg:#dbe4ff;--blue-text:#1864ab;
    --amber:#b45309;--amber-bg:#fef3c7;--amber-text:#78350f;
    --red:#c92a2a;--red-bg:#fee2e2;--red-text:#7f1d1d;
    --purple:#6d28d9;--purple-bg:#ede9fe;--purple-text:#4c1d95;
    --teal:#0d9488;--teal-bg:#ccfbf1;--teal-text:#134e4a;
    --coral:#d97706;--coral-bg:#ffedd5;--coral-text:#7c2d12;
  }
}
/* Forzar dark si el navegador no reporta preferencia (incógnito, algunos móviles) */
@media not (prefers-color-scheme:light){
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3250;
    --text:#e2e8f0;--text2:#94a3b8;--text3:#4a5568;
    --green:#52b788;--green-bg:#1b3a2d;--green-text:#b7e4c7;
    --blue:#74c0fc;--blue-bg:#1c2e4a;--blue-text:#a5d8ff;
    --amber:#ffc078;--amber-bg:#3d2600;--amber-text:#ffd8a8;
    --red:#ff6b6b;--red-bg:#3b0d0d;--red-text:#ffc9c9;
    --purple:#c3b1e1;--purple-bg:#2d1f4a;--purple-text:#d8bfd8;
    --teal:#2dd4bf;--teal-bg:#0d2f2a;--teal-text:#99f6e4;
    --coral:#f4a261;--coral-bg:#3a1a0a;--coral-text:#ffd8b8;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;padding-bottom:72px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
button{font-family:inherit;cursor:pointer}
.app-header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:15px;font-weight:600;color:var(--text)}
.app-title span{color:var(--green)}
.header-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text2);font-size:12px}
.header-btn:hover{background:var(--surface2)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--border);display:flex}
.nav-btn{flex:1;background:none;border:none;padding:10px 4px 8px;color:var(--text3);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.nav-btn.active{color:var(--green)}
.nav-btn svg{width:20px;height:20px}
#content{padding:12px 14px;max-width:680px;margin:0 auto}
.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin:18px 0 8px}
.section-title:first-child{margin-top:4px}

/* DASHBOARD */
.dash-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;text-align:center}
.dash-pct{font-size:48px;font-weight:700;color:var(--green);line-height:1}
.dash-sub{font-size:12px;color:var(--text2);margin:4px 0 14px}
.progress-bar{background:var(--surface2);border-radius:4px;height:8px;overflow:hidden}
.progress-fill{background:var(--green);height:100%;border-radius:4px;transition:width .4s ease}
.progress-bar.sm{height:4px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center}
.stat-val{font-size:18px;font-weight:600;color:var(--text)}
.stat-label{font-size:10px;color:var(--text2);margin-top:2px}
.current-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:4px}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cc-name{font-size:14px;font-weight:600}
.cc-period{font-size:11px;color:var(--text2)}
.cc-prog{display:flex;align-items:center;gap:8px;margin-top:8px}
.cc-prog span{font-size:11px;color:var(--text2);min-width:28px;text-align:right}
.cert-pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 12px;margin-bottom:8px;font-size:12px;width:100%}
.cert-pill-name{flex:1;font-weight:500}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.badge.voucher{background:var(--amber-bg);color:var(--amber-text)}
.badge.gratis{background:var(--green-bg);color:var(--green-text)}
.badge.pago{background:var(--surface2);color:var(--text2)}
.badge.pendiente{background:var(--surface2);color:var(--text2)}
.badge.programado{background:var(--blue-bg);color:var(--blue-text)}
.badge.aprobado{background:var(--green-bg);color:var(--green-text)}
.badge.reprobado{background:var(--red-bg);color:var(--red-text)}
.badge.libro{background:var(--purple-bg);color:var(--purple-text)}
.badge.curso{background:var(--blue-bg);color:var(--blue-text)}
.badge.lab{background:var(--teal-bg);color:var(--teal-text)}
.badge.practica{background:var(--amber-bg);color:var(--amber-text)}

/* CAPAS */
.phase-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.phase-hdr{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none}
.phase-hdr:hover{background:var(--surface2)}
.ph-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ph-info{flex:1;min-width:0}
.ph-name{font-size:13px;font-weight:600}
.ph-meta{font-size:11px;color:var(--text2)}
.ph-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ph-pct{font-size:12px;color:var(--text2);min-width:28px;text-align:right}
.chevron{font-size:10px;color:var(--text3)}
.ph-bar{height:3px;background:var(--surface2)}
.ph-fill{height:100%;transition:width .3s}
.weeks-list{padding:8px}
.capa-note{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;margin:0 2px 8px;line-height:1.45}
.capa-note b{color:var(--text);font-weight:600}
.week-item{border-radius:var(--radius-sm);margin-bottom:6px;padding:10px;background:var(--surface2);border:1px solid transparent;transition:border-color .15s}
.week-item.done{opacity:.65}
.week-item.done .week-title{text-decoration:line-through}
.week-row{display:flex;align-items:flex-start;gap:8px}
.week-row input[type=checkbox]{width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:var(--green);cursor:pointer}
.week-title{font-size:13px;font-weight:500;flex:1}
.wtype{font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;white-space:nowrap}
.wtype.base{background:var(--surface);color:var(--text2)}
.wtype.lab{background:var(--teal-bg);color:var(--teal-text)}
.wtype.exam{background:var(--amber-bg);color:var(--amber-text)}
.week-topics{margin:6px 0 6px 24px}
.topic{font-size:11px;color:var(--text2);padding:1px 0;padding-left:10px;position:relative}
.topic::before{content:'–';position:absolute;left:0;color:var(--text3)}
.notes-btn{background:none;border:none;color:var(--text3);font-size:11px;margin-left:24px;padding:2px 0;cursor:pointer;display:flex;align-items:center;gap:4px}
.notes-btn:hover{color:var(--blue)}
.notes-btn.has-note{color:var(--amber)}

/* RESOURCES */
.filters{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.filters select{flex:1;min-width:100px}
.res-count{font-size:11px;color:var(--text2);margin-bottom:8px}
.res-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.res-card.done{opacity:.55}
.res-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.res-check{display:flex;align-items:flex-start;gap:8px;flex:1;cursor:pointer}
.res-check input[type=checkbox]{width:16px;height:16px;margin-top:1px;flex-shrink:0;accent-color:var(--green)}
.res-title{font-size:13px;font-weight:500}
.res-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.res-phase{font-size:11px;margin-bottom:4px}
.res-desc{font-size:12px;color:var(--text2);margin-bottom:6px;line-height:1.45}
.res-link{font-size:12px;color:var(--blue)}

/* EXAMS */
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.exam-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
.exam-name{font-size:14px;font-weight:600}
.exam-meta{font-size:11px;color:var(--text2);margin-top:2px}
.exam-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.exam-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px}
.exam-note{font-size:11px;color:var(--text3);margin-top:8px;font-style:italic}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.modal textarea{min-height:140px;resize:vertical;margin-bottom:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer}
.btn:hover{background:var(--border)}
.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn.primary:hover{opacity:.9}
.btn.danger{background:var(--red-bg);color:var(--red-text);border-color:var(--red-bg)}
.settings-list{display:flex;flex-direction:column;gap:8px}
.settings-list .btn{text-align:left;width:100%;justify-content:flex-start}
.settings-divider{height:1px;background:var(--border);margin:4px 0}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">☁ Ruta <span>Cloud</span> · por conocimiento</div>
  <button class="header-btn" onclick="showSettings()">⚙ Datos</button>
</header>

<main id="content"></main>

<nav class="bottom-nav">
  <button class="nav-btn active" data-tab="dash" onclick="showTab('dash')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Panel
  </button>
  <button class="nav-btn" data-tab="capas" onclick="showTab('capas')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    Capas
  </button>
  <button class="nav-btn" data-tab="recursos" onclick="showTab('recursos')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    Recursos
  </button>
  <button class="nav-btn" data-tab="examenes" onclick="showTab('examenes')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Exámenes
  </button>
</nav>

<div class="overlay" id="notes-overlay">
  <div class="modal">
    <h3 id="notes-modal-title">Notas</h3>
    <textarea id="notes-area" placeholder="Tus apuntes, dudas, recursos extra para este bloque..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeNotes()">Cancelar</button>
      <button class="btn primary" onclick="saveNotes()">Guardar</button>
    </div>
  </div>
</div>

<div class="overlay" id="settings-overlay">
  <div class="modal">
    <h3>Gestión de datos</h3>
    <div class="settings-list">
      <button class="btn" onclick="exportData()">⬇ Exportar progreso (JSON)</button>
      <button class="btn" onclick="document.getElementById('import-file').click()">⬆ Importar progreso (JSON)</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
      <div class="settings-divider"></div>
      <small style="color:var(--text2);font-size:11px">Exporta el JSON y guárdalo para sincronizar entre dispositivos. Al importarlo en otro browser, tu progreso queda disponible.</small>
      <div class="settings-divider"></div>
      <button class="btn danger" onclick="confirmReset()">✕ Reiniciar todo el progreso</button>
      <button class="btn" onclick="closeSettings()">Cerrar</button>
    </div>
  </div>
</div>

<script>
/* Ruta reorganizada POR CONOCIMIENTO (no por tiempo).
   13 capas ordenadas por prerrequisito. Cada capa agrupa bloques de
   conocimiento (competencias), no semanas. Las certificaciones son hitos
   que caen cuando el conocimiento ya está, no metas de calendario. */
const CAPAS=[
{id:0,name:'1 · Cimientos del sistema',color:'#52b788',certs:[],voucher:false,
 note:'<b>Base de todo.</b> Las redes que aprendes aquí reaparecen en VPC (AWS), AZ-700 y ANS. Si algo merece sobre-inversión, es esta capa.',
 blocks:[
  {id:'linux',t:'Linux operativo',type:'base',tp:['Diagnóstico: htop, ss, lsof, strace, iotop','Permisos: chmod/chown/ACLs/umask con casos reales','Servicios systemd: units, journald, targets, cgroups']},
  {id:'bash',t:'Bash y automatización',type:'lab',tp:['Scripting: loops, funciones, trap, getopts, arrays asociativos','Gestión de paquetes: apt, yum, dpkg, repos custom','Lab: script monitor CPU/RAM → alerta webhook']},
  {id:'redes',t:'Redes fundamentales',type:'base',tp:['Modelo OSI capa por capa con herramientas reales','TCP/IP, CIDR, subnetting a mano','DNS, TLS/SSL, SSH, HTTP/2, SFTP a bajo nivel']},
  {id:'routing',t:'Routing, firewalls y proxies',type:'lab',tp:['BGP intro: AS, atributos (MED, LP, AS-path), peering','iptables/nftables: chains, NAT, conntrack, persistencia','nginx: reverse proxy, load balancing, SSL termination','Lab: routing manual entre subredes en 2-3 VMs']}
 ],
 resources:[
  {id:'r0-0',t:'The Linux Command Line — William Shotts',type:'libro',paid:false,url:'https://linuxcommand.org/tlcl.php',desc:'Libro completo disponible gratis en linuxcommand.org. Cubre shell, scripting, procesos y más. Referencia permanente.'},
  {id:'r0-1',t:'Linux for Hackers — NetworkChuck (YouTube)',type:'curso',paid:false,url:'https://www.youtube.com/playlist?list=PLIhvC56v63IJIujb5cyE13oLuyORZpdkL',desc:'Playlist práctica de ~20 videos. Enfocada en sysadmin y networking desde perspectiva de hacking ético.'},
  {id:'r0-2',t:'OverTheWire: Bandit',type:'lab',paid:false,url:'https://overthewire.org/wargames/bandit/',desc:'Wargame de Linux con 34 niveles progresivos. Cubre SSH, permisos, grep, pipes, scripting básico. Mejor lab práctico gratis.'},
  {id:'r0-3',t:'Professor Messer Network+ (N10-009)',type:'curso',paid:false,url:'https://www.professormesser.com/network-plus/n10-009-network-plus/',desc:'Curso completo de networking gratis en video. Cubre OSI, TCP/IP, protocolos, routing, VLANs, firewalls. Muy bien explicado.'},
  {id:'r0-4',t:'Subnetting Practice',type:'lab',paid:false,url:'https://subnettingpractice.com/',desc:'Práctica interactiva de subnetting y CIDR. Excelente para afianzar el cálculo de subredes sin herramientas.'},
  {id:'r0-5',t:'NetworkChuck — BGP explicado',type:'curso',paid:false,url:'https://www.youtube.com/watch?v=_Z29ZzKeZHc',desc:'Video de ~30 min que explica BGP de forma práctica con ejemplos. Buen punto de entrada antes de los labs de AWS.'},
  {id:'r0-6',t:'Cisco Packet Tracer (gratis con cuenta)',type:'lab',paid:false,url:'https://skillsforall.com/resources/lab-downloads',desc:'Simulador de redes de Cisco. Crea topologías, configura routing, OSPF, BGP, VLAN. Requiere cuenta gratuita en Cisco Skills.'}
 ]
},
{id:1,name:'2 · Control de versiones',color:'#2dd4bf',certs:[],voucher:false,
 note:'<b>Insertado para arrancar de 0.</b> Tu roadmap lo daba por sabido, pero lo usas en cada commit, PR y pipeline del resto de la ruta.',
 blocks:[
  {id:'git',t:'Git: fundamentos',type:'base',tp:['Modelo de Git: working tree, staging, commits, HEAD','Branches, merge vs rebase, resolución de conflictos','.gitignore, tags, stash, reflog para recuperación']},
  {id:'github',t:'GitHub: colaboración',type:'base',tp:['Pull requests, code review, issues, proyectos','Branch protection, CODEOWNERS, required checks','Commits firmados (GPG/SSH) y buenas prácticas de historia']}
 ],
 resources:[
  {id:'g-0',t:'Pro Git — Scott Chacon (gratis, español)',type:'libro',paid:false,url:'https://git-scm.com/book/es/v2',desc:'El libro oficial de Git, gratis y en español. Va de lo básico hasta los internals. Referencia permanente para entender qué hace cada comando.'},
  {id:'g-1',t:'Learn Git Branching (interactivo)',type:'lab',paid:false,url:'https://learngitbranching.js.org/?locale=es_ES',desc:'Visualiza branches, merge y rebase de forma interactiva en el browser. La mejor manera de construir el modelo mental de Git.'},
  {id:'g-2',t:'GitHub Skills — Introduction to GitHub',type:'lab',paid:false,url:'https://skills.github.com/',desc:'Labs oficiales de GitHub en repos reales. Aprende PRs, issues y el flujo de trabajo colaborativo paso a paso.'},
  {id:'g-3',t:'Atlassian Git Tutorials',type:'curso',paid:false,url:'https://www.atlassian.com/git/tutorials',desc:'Tutoriales claros sobre comandos, branching strategies (Git Flow, trunk-based) y resolución de conflictos. Buen complemento de referencia.'}
 ]
},
{id:2,name:'3 · Programación para infra',color:'#74c0fc',certs:[],voucher:false,
 note:'Python <b>aplicado a cloud/DevOps</b>, no académico: el foco es boto3, APIs REST y parseo de JSON/YAML para IaC y CI/CD.',
 blocks:[
  {id:'py-inter',t:'Python intermedio',type:'base',tp:['OOP: clases, herencia, dunder, dataclasses, @property','Context managers, decorators, generators, itertools','Testing: pytest fixtures, mocks, parametrize, coverage']},
  {id:'py-infra',t:'Python aplicado a cloud/DevOps',type:'lab',tp:['subprocess, os, pathlib para scripts de infraestructura','JSON/YAML: json, PyYAML, pydantic para validar config','boto3: listar/filtrar recursos AWS, costos por tag','APIs REST con requests; lab: alerta a webhook']}
 ],
 resources:[
  {id:'r1-0',t:'aprendepython.es',type:'curso',paid:false,url:'https://aprendepython.es/',desc:'Recurso en español de alta calidad. Cubre Python desde cero hasta intermedio. Tiene ejercicios al final de cada sección. Recomendado como base.'},
  {id:'r1-1',t:'CS50P — Python (Harvard, gratis)',type:'curso',paid:false,url:'https://cs50.harvard.edu/python/2022/',desc:'Curso de Python de Harvard con certificado gratuito. 10 semanas, muy bien estructurado. Los problem sets son excelente práctica.'},
  {id:'r1-2',t:'Exercism — Python track',type:'lab',paid:false,url:'https://exercism.org/tracks/python',desc:'110 ejercicios con feedback de mentores. Cubre de básico a avanzado. Ideal para afianzar OOP, funciones, comprehensions.'}
 ]

const KEY='crm-v3';
let S={};
let openPh=new Set();
let resPhase='all',resType='all',resDone='all';
let activeTab='dash';
let notesKey=null;

function load(){
  try{const d=localStorage.getItem(KEY);if(d)S=JSON.parse(d);}catch(e){}
  S.dw=S.dw||{};
  S.dr=S.dr||{};
  S.notes=S.notes||{};
  S.exams=S.exams||JSON.parse(JSON.stringify(DEFAULT_EXAMS));
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){alert('Error guardando: '+e.message);}}

function totalB(){return CAPAS.reduce((a,c)=>a+c.blocks.length,0);}
function doneB(){return Object.values(S.dw).filter(Boolean).length;}
function totalR(){return CAPAS.reduce((a,c)=>a+c.resources.length,0);}
function doneR(){return Object.values(S.dr).filter(Boolean).length;}
function pp(cid){const c=CAPAS[cid],d=c.blocks.filter(b=>S.dw[cid+':'+b.id]).length;return Math.round(d/c.blocks.length*100);}
function op(){return Math.round(doneB()/totalB()*100);}
function certsDone(){return S.exams.filter(e=>e.status==='aprobado').length;}
function currentCapaIdx(){let i=CAPAS.findIndex(c=>pp(c.id)<100);return i<0?CAPAS.length-1:i;}
function capaCertLabel(c){return c.certs.length?c.certs.join(', '):'Sin certificación';}

function showTab(tab){
  activeTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  render();
  window.scrollTo(0,0);
}

function render(){
  const c=document.getElementById('content');
  if(activeTab==='dash')c.innerHTML=renderDash();
  else if(activeTab==='capas')c.innerHTML=renderCapas();
  else if(activeTab==='recursos')c.innerHTML=renderRecursos();
  else c.innerHTML=renderExamenes();
}

function renderDash(){
  const pct=op(),ci=currentCapaIdx(),cp=CAPAS[ci];
  const pending=S.exams.filter(e=>e.status!=='aprobado');
  return '<div class="dash-hero"><div class="dash-pct">'+pct+'%</div><div class="dash-sub">completado · '+doneB()+' de '+totalB()+' bloques</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>'
    +'<div class="stats-grid">'
    +'<div class="stat-card"><div class="stat-val">'+doneB()+'</div><div class="stat-label">Bloques hechos</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+doneR()+'</div><div class="stat-label">Recursos</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+certsDone()+'</div><div class="stat-label">Certificaciones</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+(CAPAS.length-ci)+'</div><div class="stat-label">Capas restantes</div></div>'
    +'</div>'
    +'<div class="section-title">Capa actual</div>'
    +'<div class="current-card"><div class="cc-top"><div class="cc-dot" style="background:'+cp.color+'"></div><div><div class="cc-name">'+cp.name+'</div><div class="cc-period">'+capaCertLabel(cp)+'</div></div></div>'
    +'<div class="cc-prog"><div class="progress-bar sm" style="flex:1"><div class="progress-fill" style="width:'+pp(cp.id)+'%"></div></div><span>'+pp(cp.id)+'%</span></div></div>'
    +'<div class="section-title">Próximas certificaciones</div>'
    +pending.slice(0,4).map(e=>'<div class="cert-pill"><span class="cert-pill-name">'+e.name+'</span>'+(e.voucher?'<span class="badge voucher">VOUCHER</span>':'')+(e.price>0?'<span class="badge pendiente">$'+e.price+' USD</span>':e.price===0&&!e.voucher?'<span class="badge gratis">GRATIS</span>':'')+'</div>').join('')
    +(cp.note?'<div class="section-title">Nota de capa</div><div style="font-size:12px;color:var(--text2);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;line-height:1.5">'+cp.note+'</div>':'');
}

function renderCapas(){
  return '<div>'+CAPAS.map(c=>{
    const pct=pp(c.id),open=openPh.has(c.id);
    const blocksHtml=open?'<div class="weeks-list">'
      +(c.note?'<div class="capa-note">'+c.note+'</div>':'')
      +c.blocks.map(b=>{
      const k=c.id+':'+b.id,done=S.dw[k],hasNote=S.notes[k];
      const typeLbl=b.type==='lab'?'Lab':b.type==='exam'?'Exam':'Teoría';
      return '<div class="week-item'+(done?' done':'')+'"><div class="week-row"><input type="checkbox"'+(done?' checked':'')+" onchange=\"toggleBlock("+c.id+",'"+b.id+"',this.checked)\">"
        +'<span class="week-title">'+b.t+'</span>'
        +'<span class="wtype '+b.type+'">'+typeLbl+'</span></div>'
        +'<div class="week-topics">'+b.tp.map(t=>'<div class="topic">'+t+'</div>').join('')+'</div>'
        +"<button class='notes-btn"+(hasNote?' has-note':'')+"' onclick=\"openNotes('"+k+"','"+b.t.replace(/'/g,'&#39;')+"')\">"+(hasNote?'📝 Ver nota':'+ Nota')+'</button>'
        +'</div>';
    }).join('')+'</div>':'';
    return '<div class="phase-card">'
      +'<div class="phase-hdr" onclick="togglePh('+c.id+')">'
      +'<div class="ph-dot" style="background:'+c.color+'"></div>'
      +'<div class="ph-info"><div class="ph-name">'+c.name+'</div><div class="ph-meta">'+capaCertLabel(c)+' · '+c.blocks.length+' bloques</div></div>'
      +'<div class="ph-right">'+(c.voucher?'<span class="badge voucher">VOUCHER</span>':'')
      +'<div class="ph-pct">'+pct+'%</div><span class="chevron">'+(open?'▲':'▼')+'</span></div></div>'
      +'<div class="ph-bar"><div class="ph-fill" style="width:'+pct+'%;background:'+c.color+'"></div></div>'
      +blocksHtml+'</div>';
  }).join('')+'</div>';
}

function renderRecursos(){
  let all=[];
  CAPAS.forEach(c=>c.resources.forEach(r=>all.push({...r,pid:c.id,pname:c.name,pc:c.color})));
  if(resPhase!=='all')all=all.filter(r=>r.pid===parseInt(resPhase));
  if(resType!=='all')all=all.filter(r=>r.type===resType);
  if(resDone==='done')all=all.filter(r=>S.dr[r.pid+':'+r.id]);
  if(resDone==='pending')all=all.filter(r=>!S.dr[r.pid+':'+r.id]);
  const phOpts=CAPAS.map(c=>'<option value="'+c.id+'"'+(resPhase==c.id?' selected':'')+'>'+c.name+'</option>').join('');
  return '<div class="filters">'
    +'<select onchange="resPhase=this.value;render()"><option value="all">Todas las capas</option>'+phOpts+'</select>'
    +'<select onchange="resType=this.value;render()"><option value="all">Todos los tipos</option><option value="libro"'+(resType==='libro'?' selected':'')+'>Libro</option><option value="curso"'+(resType==='curso'?' selected':'')+'>Curso</option><option value="lab"'+(resType==='lab'?' selected':'')+'>Lab</option><option value="practica"'+(resType==='practica'?' selected':'')+'>Práctica</option></select>'
    +'<select onchange="resDone=this.value;render()"><option value="all">Todos</option><option value="pending"'+(resDone==='pending'?' selected':'')+'>Pendientes</option><option value="done"'+(resDone==='done'?' selected':'')+'>Completados</option></select>'
    +'</div>'
    +'<div class="res-count">'+all.length+' recurso(s)</div>'
    +'<div>'+all.map(r=>{
      const k=r.pid+':'+r.id,done=S.dr[k];
      return '<div class="res-card'+(done?' done':'')+'"><div class="res-top"><label class="res-check"><input type="checkbox"'+(done?' checked':'')+" onchange=\"toggleRes('"+k+"',this.checked)\"><span class=\"res-title\">"+r.t+'</span></label>'
        +'<div class="res-badges"><span class="badge '+r.type+'">'+r.type+'</span>'+(r.paid?'<span class="badge pago">Pago</span>':'<span class="badge gratis">Gratis</span>')+'</div></div>'
        +'<div class="res-phase" style="color:'+r.pc+';font-size:11px;margin-bottom:4px">Capa: '+r.pname+'</div>'
        +'<div class="res-desc">'+r.desc+'</div>'
        +(r.url?'<a href="'+r.url+'" target="_blank" class="res-link">Abrir recurso →</a>':'')
        +'</div>';
    }).join('')+'</div>';
}

function renderExamenes(){
  return '<div>'+S.exams.map((e,i)=>{
    const isPh=CAPAS[e.phaseId];
    return '<div class="exam-card"><div class="exam-top"><div>'
      +'<div class="exam-name">'+e.name+'</div>'
      +'<div class="exam-meta">'+e.org+(isPh?' · '+isPh.name:'')+'</div></div>'
      +'<div class="exam-badges">'+(e.voucher?'<span class="badge voucher">VOUCHER</span>':e.price===0?'<span class="badge gratis">GRATIS</span>':'<span style="font-size:11px;color:var(--text2)">$'+e.price+' USD</span>')
      +'<span class="badge '+e.status+'" style="margin-left:4px">'+e.status+'</span></div></div>'
      +'<div class="exam-fields">'
      +'<div class="field"><label>Fecha planificada</label><input type="date" value="'+e.planned+'" onchange="updateExam('+i+',\'planned\',this.value)"></div>'
      +'<div class="field"><label>Fecha rendida</label><input type="date" value="'+e.taken+'" onchange="updateExam('+i+',\'taken\',this.value)"></div>'
      +'<div class="field"><label>Score / Resultado</label><input type="text" value="'+e.score+'" placeholder="ej: 850/1000 o PASS" onchange="updateExam('+i+',\'score\',this.value)"></div>'
      +'<div class="field"><label>Estado</label><select onchange="updateExam('+i+',\'status\',this.value)"><option'+(e.status==='pendiente'?' selected':'')+'>pendiente</option><option'+(e.status==='programado'?' selected':'')+'>programado</option><option'+(e.status==='aprobado'?' selected':'')+'>aprobado</option><option'+(e.status==='reprobado'?' selected':'')+'>reprobado</option></select></div>'
      +'</div>'
      +(e.url?'<div style="margin-top:8px"><a href="'+e.url+'" target="_blank" style="font-size:12px;color:var(--blue)">Registrarse en '+e.org+' →</a></div>':'')
      +'</div>';
  }).join('')+'</div>';
}

function togglePh(id){
  if(openPh.has(id))openPh.delete(id);
  else openPh.add(id);
  render();
}
function toggleBlock(cid,bid,checked){S.dw[cid+':'+bid]=checked;save();render();}
function toggleRes(key,checked){S.dr[key]=checked;save();render();}
function updateExam(i,field,val){S.exams[i][field]=val;save();}

let notesTitle='';
function openNotes(key,title){
  notesKey=key;notesTitle=title;
  document.getElementById('notes-modal-title').textContent=title;
  document.getElementById('notes-area').value=S.notes[key]||'';
  document.getElementById('notes-overlay').classList.add('show');
}
function saveNotes(){S.notes[notesKey]=document.getElementById('notes-area').value;save();closeNotes();render();}
function closeNotes(){document.getElementById('notes-overlay').classList.remove('show');}

function showSettings(){document.getElementById('settings-overlay').classList.add('show');}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('show');}

function exportData(){
  const d=JSON.stringify(S,null,2);
  const b=new Blob([d],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='cloud-roadmap-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function importData(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{S=JSON.parse(e.target.result);save();render();closeSettings();alert('Progreso importado correctamente.');}catch(err){alert('Error: archivo JSON inválido.');}};
  r.readAsText(f);input.value='';
}
function confirmReset(){
  if(confirm('¿Borrar todo el progreso? Esta acción no se puede deshacer.')){
    localStorage.removeItem(KEY);load();render();closeSettings();
  }
}

document.getElementById('notes-overlay').addEventListener('click',function(e){if(e.target===this)closeNotes();});
document.getElementById('settings-overlay').addEventListener('click',function(e){if(e.target===this)closeSettings();});

load();render();
</script>
</body>
</html>
